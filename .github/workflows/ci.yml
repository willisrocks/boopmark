name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Only checks the boop CLI crate — the server crate requires Postgres
  # and has its own test infrastructure (docker compose, migrations, etc.)
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy -p boop --all-targets -- -D warnings
      - name: Tests
        run: cargo test -p boop

  install-script:
    name: Install script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install script tests
        run: sh tests/test_install.sh
