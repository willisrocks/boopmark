<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BoopMark{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/boopmark-logo.svg">
    <meta name="description" content="Your bookmarks, organized.">
    <meta property="og:title" content="BoopMark">
    <meta property="og:description" content="Your bookmarks, organized.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/static/boopmark-logo.svg">
    <link rel="stylesheet" href="/static/css/output.css">
    <style>
        .htmx-indicator { display: none; }
        .htmx-indicator.htmx-request { display: flex; }
    </style>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-[#0f1117] text-gray-200 min-h-screen">
    {% block content %}{% endblock %}
</body>
</html>
