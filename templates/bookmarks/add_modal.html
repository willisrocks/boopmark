<div id="add-modal" data-testid="add-bookmark-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-[#1e2235] rounded-xl border border-gray-700 p-6 w-full max-w-md">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-medium">Add Bookmark</h2>
            <button onclick="document.getElementById('add-modal').classList.add('hidden')"
                    class="text-gray-500 hover:text-gray-300">&times;</button>
        </div>
        <form hx-post="/bookmarks"
              hx-target="#bookmark-grid"
              hx-swap="afterbegin"
              hx-on::after-request="if(event.detail.successful && event.detail.elt === this) { document.getElementById('bookmark-url-input').value = ''; document.getElementById('bookmark-title-input').value = ''; document.getElementById('bookmark-description-input').value = ''; var ti = document.querySelector('[name=tags_input]'); if(ti) ti.value = ''; document.getElementById('add-modal').classList.add('hidden'); }"
              class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">URL</label>
                <input id="bookmark-url-input"
                       data-testid="bookmark-url-input"
                       type="url"
                       name="url"
                       required
                       placeholder="https://example.com"
                       hx-post="/bookmarks/suggest"
                       hx-trigger="blur"
                       hx-target="#bookmark-suggest-target"
                       hx-swap="outerHTML"
                       hx-include="closest form"
                       hx-indicator="#suggest-spinner"
                       class="w-full px-3 py-2 rounded-lg bg-[#0f1117] border border-gray-700 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-blue-500">
            </div>
            {% include "bookmarks/add_modal_suggest_fields.html" %}
            <div class="flex gap-3 justify-end">
                <button type="button"
                        onclick="document.getElementById('add-modal').classList.add('hidden')"
                        class="px-4 py-2 rounded-lg border border-gray-700 text-gray-400 hover:text-gray-200">
                    Cancel
                </button>
                <button data-testid="bookmark-submit-button"
                        type="submit"
                        class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white">
                    Add Bookmark
                </button>
            </div>
        </form>
    </div>
</div>
