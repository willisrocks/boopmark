{% extends "base.html" %}
{% block title %}Invite Not Valid — BoopMark{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-screen px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <img src="/static/boopmark-logo.svg" alt="BoopMark" class="w-16 h-16 mx-auto">
            <h1 class="text-2xl font-bold mt-3 text-white">Invite not valid</h1>
            <p class="text-sm text-gray-500 mt-1">This invite link has expired or has already been used.</p>
        </div>
        <div class="bg-[#1e2235] rounded-xl border border-gray-700 p-8 shadow-lg shadow-black/20 text-center">
            <p class="text-gray-400">Ask the person who invited you for a new link.</p>
        </div>
    </div>
</div>
{% endblock %}
