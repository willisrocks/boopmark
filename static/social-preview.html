<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Boopmark Social Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #fdf6f0;
    position: relative;
  }

  .card {
    width: 1280px;
    height: 640px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 64px;
    padding: 40px 80px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle decorative circles in the background */
  .card::before {
    content: '';
    position: absolute;
    top: -120px;
    right: -80px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(245, 197, 66, 0.12);
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: -100px;
    left: -60px;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: rgba(232, 101, 74, 0.08);
  }

  .logo {
    flex-shrink: 0;
    width: 260px;
    height: 310px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 8px 24px rgba(232, 101, 74, 0.18));
  }

  .logo svg {
    width: 100%;
    height: 100%;
  }

  .text {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .title {
    font-size: 96px;
    font-weight: 800;
    color: #2d2d2d;
    letter-spacing: -2px;
    line-height: 1;
  }

  .tagline {
    font-size: 30px;
    font-weight: 400;
    color: #5a5a5a;
    line-height: 1.4;
    max-width: 520px;
  }

  .accent-bar {
    width: 72px;
    height: 6px;
    background: linear-gradient(90deg, #e8654a, #f5c542);
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 454 539" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(222, 307)">
          <path d="M-155,-210 Q-155,-250 -115,-250 L125,-250 Q165,-250 165,-210 L165,175 L82,105 L0,175 L-82,105 L-155,175 Z" fill="#e8654a" stroke="#2d2d2d" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="155" cy="-230" r="70" fill="#f5c542" stroke="#2d2d2d" stroke-width="14"/>
          <circle cx="-55" cy="-75" r="17" fill="#2d2d2d"/>
          <circle cx="55" cy="-75" r="17" fill="#2d2d2d"/>
          <path d="M-25,10 Q5,50 45,5" fill="none" stroke="#2d2d2d" stroke-width="10" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <div class="text">
      <div class="title">Boopmark</div>
      <div class="accent-bar"></div>
      <div class="tagline">A bookmark manager for humans and AI agents</div>
    </div>
  </div>
</body>
</html>
