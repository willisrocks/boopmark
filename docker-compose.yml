services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boopmark
      POSTGRES_USER: boopmark
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boopmark"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  screenshot-svc:
    build: ./screenshot-svc
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"

  server:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://boopmark:devpassword@db:5432/boopmark
      S3_ENDPOINT: http://minio:9000
      LOGIN_ADAPTER: "local_password"
      SCREENSHOT_SERVICE_URL: http://screenshot-svc:3001
    ports:
      - "4000:4000"
    labels:
      - "devproxy.port=4000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      screenshot-svc:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
