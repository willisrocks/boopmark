services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: boopmark
      POSTGRES_USER: boopmark
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boopmark"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Uncomment to enable S3-compatible storage (set STORAGE_BACKEND=s3 in .env)
  # rustfs:
  #   image: rustfs/rustfs
  #   command: server /data --console-address ":9001"
  #   environment:
  #     RUSTFS_ROOT_USER: rustfsadmin
  #     RUSTFS_ROOT_PASSWORD: rustfsadmin
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"

  # Uncomment to enable screenshot capture (set SCREENSHOT_BACKEND=playwright in .env)
  # screenshot-svc:
  #   build: ./screenshot-svc
  #   ports:
  #     - "3001:3001"
  #   environment:
  #     PORT: "3001"

  server:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://boopmark:devpassword@db:5432/boopmark
      LOGIN_ADAPTER: "local_password"
    ports:
      - "4000:4000"
    labels:
      - "devproxy.port=4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
